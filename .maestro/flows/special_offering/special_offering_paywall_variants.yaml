appId: com.mizuki.Ohashi.Pilll.dev
---
# 設定タブ > 開発者オプションの debug row から、スペシャルオファー Paywall(年額/月額)の
# 文言バリアント(default/scarcity)A/Bテストの表示を確認するフロー。
# 対象実装:
#   lib/features/settings/components/rows/special_offering_paywall_row.dart (debug row / バリアント選択ダイアログ)
#   lib/features/special_offering/page.dart  (年額 Paywall)
#   lib/features/special_offering/page2.dart (月額 Paywall)
#
# 注意(未検証・要確認事項):
# - オファー画面を閉じる×ボタンは IconButton(icon: Icons.close) で tooltip/semanticLabel/
#   accessibilityIdentifier が未設定のため、Maestroのtext/idセレクタでは検出できない。
#   そのため座標タップで代用している(point: "8%,20%")。この座標は
#   DraggableScrollableSheet(initialChildSize/maxChildSize: 0.9) によりシート上端が画面上から
#   約10%の位置に来ること、AppBarのtoolbar高さ(56pt)とセーフエリア分を加味した推定値であり、
#   実機/シミュレータでの実行前に mobile-mcp 等で実座標を検証すること。
#   ずれていた場合は tapOn 直後の assertVisible: "本当に閉じますか？" で失敗し検知できる。
# - ListTile(title+subtitle)の行タップは、アクセシビリティツリー上で title と subtitle が
#   1要素に結合される可能性を考慮し、末尾に ".*" を付けた正規表現でタップ対象を指定している。

- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      notifications: allow
- waitForAnimationToEnd
- runFlow: ../feature_appeal/subflows/initial_setup.yaml
- waitForAnimationToEnd

# 設定タブに切替。タブはアイコン+ラベルの Tab だが、feature_appeal フローの慣習に合わせ座標タップする
- tapOn:
    point: "88%,95%"
- waitForAnimationToEnd

# 開発者オプションセクション(スペシャルオファー Paywall(年額)行)までスクロール
- scrollUntilVisible:
    element:
      text: "スペシャルオファー Paywall\\(年額\\).*"
    direction: DOWN
    timeout: 20000

# --- 年額 Paywall: default バリアント ---
- tapOn: "スペシャルオファー Paywall\\(年額\\).*"
- waitForAnimationToEnd
- assertVisible: "文言バリアントを選択"
- tapOn: "default（現行文言）"
- extendedWaitUntil:
    visible: "今回だけの特別価格でプレミアム機能をゲット！"
    timeout: 20000
- assertVisible: "今回限りの特別オファー"
- tapOn:
    point: "8%,20%"
- assertVisible: "本当に閉じますか？"
- tapOn: "閉じる"
- waitForAnimationToEnd
- assertVisible: "スペシャルオファー Paywall\\(年額\\).*"

# --- 年額 Paywall: scarcity バリアント ---
- scrollUntilVisible:
    element:
      text: "スペシャルオファー Paywall\\(年額\\).*"
    direction: DOWN
    timeout: 20000
- tapOn: "スペシャルオファー Paywall\\(年額\\).*"
- waitForAnimationToEnd
- assertVisible: "文言バリアントを選択"
- tapOn: "scarcity（希少性・限定性訴求）"
- extendedWaitUntil:
    visible: "このチャンスは今回限り。[\\s\\S]*ゲット！"
    timeout: 20000
- assertVisible: "今回限りの特別オファー"
- tapOn:
    point: "8%,20%"
- assertVisible: "本当に閉じますか？"
- tapOn: "閉じる"
- waitForAnimationToEnd
- assertVisible: "スペシャルオファー Paywall\\(年額\\).*"

# --- 月額 Paywall: default バリアント ---
- scrollUntilVisible:
    element:
      text: "スペシャルオファー Paywall\\(月額\\).*"
    direction: DOWN
    timeout: 20000
- tapOn: "スペシャルオファー Paywall\\(月額\\).*"
- waitForAnimationToEnd
- assertVisible: "文言バリアントを選択"
- tapOn: "default（現行文言）"
- extendedWaitUntil:
    visible: "今回だけの特別価格でプレミアム機能をゲット！"
    timeout: 20000
- assertVisible: "今回限りの特別オファー"
- tapOn:
    point: "8%,20%"
- assertVisible: "本当に閉じますか？"
- tapOn: "閉じる"
- waitForAnimationToEnd
- assertVisible: "スペシャルオファー Paywall\\(月額\\).*"

# --- 月額 Paywall: scarcity バリアント ---
- scrollUntilVisible:
    element:
      text: "スペシャルオファー Paywall\\(月額\\).*"
    direction: DOWN
    timeout: 20000
- tapOn: "スペシャルオファー Paywall\\(月額\\).*"
- waitForAnimationToEnd
- assertVisible: "文言バリアントを選択"
- tapOn: "scarcity（希少性・限定性訴求）"
- extendedWaitUntil:
    visible: "このチャンスは今回限り。[\\s\\S]*ゲット！"
    timeout: 20000
- assertVisible: "今回限りの特別オファー"
- tapOn:
    point: "8%,20%"
- assertVisible: "本当に閉じますか？"
- tapOn: "閉じる"
- waitForAnimationToEnd
- assertVisible: "スペシャルオファー Paywall\\(月額\\).*"
