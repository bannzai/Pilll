appId: com.mizuki.Ohashi.Pilll.dev
---
# 初期設定を自動で完了し、ホーム画面に到達するサブフロー。
# clearState: true で呼ばれる前提。

# 通知許可ダイアログが表示される場合がある → 許可をタップ
- runFlow:
    when:
      visible: "許可"
    commands:
      - tapOn: "許可"
      - waitForAnimationToEnd

# Screen 1 (1/3): ピルシートタイプ選択
# まず「ピルの種類を選択」ボタンをタップしてモーダルを開く
- tapOn: "ピルの種類を選択"
- waitForAnimationToEnd
# モーダル内の最初のセル (21錠＋7日休薬) を座標タップ
# ボトムシート内の Flutter テキストは Maestro が検出できないため座標指定
- tapOn:
    point: "25%,33%"
- waitForAnimationToEnd
# 「次へ」で Screen 2 へ
- tapOn: "次へ"
- waitForAnimationToEnd

# Screen 2 (2/3): 今日の服用番号 → スキップ
- tapOn: "まだ分からない"
- waitForAnimationToEnd

# Screen 3 (3/3): リマインダー設定 → そのまま次へ
- tapOn: "次へ"
- waitForAnimationToEnd

# Screen 4: プレミアムトライアル → アプリ開始
- tapOn: "アプリをはじめる"
- waitForAnimationToEnd
