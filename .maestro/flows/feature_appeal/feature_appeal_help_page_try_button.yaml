appId: com.mizuki.Ohashi.Pilll
---
# HelpPage の「実際に試す」ボタンをタップした際に画面遷移が発生することを確認する。
# 有料機能の場合は Paywall、無料機能の場合はホームタブ切替が発生する。
# ここでは遷移が発生した (= HelpPage が消えた) ことを確認する。
# 前提: シミュレータ上で初期設定完了 & ログインプロバイダでサインイン済み (Keychain にセッションが残っている)。
- launchApp:
    clearState: true
    clearKeychain: false
    arguments:
      flutter.isDidEndInitialSettingKey: "true"
- waitForAnimationToEnd
- tapOn:
    text: "サイレントモードでも通知を受け取る|通知メッセージをカスタマイズ|ピルシートに日付を表示|服用履歴をかんたん記録|生理を記録・予測|カレンダーで体調を記録|未来の予定を書き込もう|ヘルスケアと連携"
- waitForAnimationToEnd
- assertVisible: "実際に試す"
- tapOn: "実際に試す"
- waitForAnimationToEnd
# タップ後の挙動は表示中の機能によって異なる:
# - 有料機能 (非Premium): Paywall シートが表示される
# - 無料機能: ホームに戻りタブが切り替わる
# ここでは HelpPage から遷移したことを確認
- assertNotVisible: "実際に試す"
